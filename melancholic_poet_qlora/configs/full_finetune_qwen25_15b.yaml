experiment_name: full_finetune_qwen25_15b
seed: 1337

model:
  base_model: Qwen/Qwen2.5-1.5B-Instruct
  trust_remote_code: false
  full_finetune: true

data:
  train_path: data/generated/custom_train.jsonl
  eval_path: data/generated/custom_val.jsonl
  max_seq_length: 1024

training:
  output_dir: outputs/full_finetune_qwen25_15b
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 0.00002
  num_train_epochs: 3
  max_steps: -1
  warmup_ratio: 0.05
  lr_scheduler_type: cosine
  weight_decay: 0.01
  max_grad_norm: 1.0
  logging_steps: 10
  eval_steps: 50
  save_steps: 50
  save_total_limit: 2
  gradient_checkpointing: true
  bf16: true
  fp16: true
  optim: paged_adamw_8bit
  report_to: []
  post_train_degradation_check: false
