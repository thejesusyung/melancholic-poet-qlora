experiment_name: qwen3_17b_backup
seed: 1337

model:
  base_model: Qwen/Qwen3-1.7B
  trust_remote_code: false
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true
  target_modules: all-linear
  lora_r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  bias: none

data:
  train_path: data/generated/mixed_train.jsonl
  eval_path: data/generated/val.jsonl
  max_seq_length: 1024

training:
  output_dir: outputs/qwen3_17b_backup
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 0.00010
  num_train_epochs: 3
  max_steps: -1
  warmup_ratio: 0.05
  lr_scheduler_type: cosine
  weight_decay: 0.01
  max_grad_norm: 0.3
  logging_steps: 10
  eval_steps: 25
  save_steps: 25
  save_total_limit: 2
  gradient_checkpointing: true
  bf16: true
  fp16: true
  optim: paged_adamw_8bit
  report_to: []
  post_train_degradation_check: false
